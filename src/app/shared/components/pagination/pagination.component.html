@if (totalPages > 1) {
  <nav class="pagination-nav" dir="ltr" aria-label="Page navigation">

    <div class="pagination-wrap">

      <!-- First -->
      <button
        class="pg-btn pg-btn--arrow"
        [disabled]="isFirst"
        (click)="goToFirst()"
        title="الصفحة الأولى"
        aria-label="الصفحة الأولى"
      >
        <i class="fa-solid fa-angles-right"></i>
      </button>

      <!-- Prev -->
      <button
        class="pg-btn pg-btn--arrow"
        [disabled]="isFirst"
        (click)="goToPrev()"
        title="السابق"
        aria-label="الصفحة السابقة"
      >
        <i class="fa-solid fa-angle-right"></i>
      </button>

      <!-- Pages -->
      @for (item of pages; track trackPage($index, item)) {
        @if (item.kind === 'page') {
          <button
            class="pg-btn"
            [class.pg-btn--active]="item.value === currentPage"
            [attr.aria-current]="item.value === currentPage ? 'page' : null"
            (click)="goTo(item.value)"
          >
            {{ item.value }}
          </button>
        } @else {
          <span class="pg-ellipsis" aria-hidden="true">&hellip;</span>
        }
      }

      <!-- Next -->
      <button
        class="pg-btn pg-btn--arrow"
        [disabled]="isLast"
        (click)="goToNext()"
        title="التالي"
        aria-label="الصفحة التالية"
      >
        <i class="fa-solid fa-angle-left"></i>
      </button>

      <!-- Last -->
      <button
        class="pg-btn pg-btn--arrow"
        [disabled]="isLast"
        (click)="goToLast()"
        title="الصفحة الأخيرة"
        aria-label="الصفحة الأخيرة"
      >
        <i class="fa-solid fa-angles-left"></i>
      </button>

    </div>

    <span class="pg-counter" aria-live="polite">
      {{ currentPage }} / {{ totalPages }}
    </span>

  </nav>
}
