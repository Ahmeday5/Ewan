<div class="container-fluid mb-3">

  <!-- Page Header -->
  <div class="row mb-4">
    <div class="col-12">
      <div class="page-header d-flex align-items-center gap-3">
        <div class="page-icon">
          <i class="fas fa-bell"></i>
        </div>
        <div>
          <h1 class="page-title mb-0">إرسال إشعار</h1>
          <p class="page-subtitle mb-0">إرسال إشعار فوري لجميع العملاء المسجلين</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Form Card -->
  <div class="row justify-content-center">
    <div class="col-lg-8 col-xl-7">
      <div class="notification-card">

        <!-- Info Banner -->
        <div class="info-banner">
          <i class="fas fa-users me-2"></i>
          <span>سيتم إرسال هذا الإشعار لجميع العملاء المسجلين على التطبيق</span>
        </div>

        <!-- Form -->
        <form [formGroup]="form" (ngSubmit)="sendNotification()" novalidate>

          <!-- Title Field -->
          <div class="field-group">
            <label class="field-label">
              عنوان الإشعار
              <span class="required-star">*</span>
            </label>
            <div class="input-wrapper" [class.has-error]="isInvalid('title')">
              <i class="fas fa-heading input-icon"></i>
              <input
                type="text"
                class="form-control custom-input"
                formControlName="title"
                placeholder="أدخل عنوان الإشعار"
                [class.is-invalid]="isInvalid('title')"
                maxlength="100"
              />
            </div>
            <div class="field-error" *ngIf="isInvalid('title')">
              <i class="fas fa-exclamation-circle me-1"></i>
              عنوان الإشعار مطلوب
            </div>
          </div>

          <!-- Body Field -->
          <div class="field-group">
            <label class="field-label d-flex justify-content-between align-items-center">
              <span>
                محتوى الإشعار
                <span class="required-star">*</span>
              </span>
              <span class="char-counter" [class.counter-warning]="bodyLength > 450" [class.counter-danger]="bodyLength > 490">
                {{ bodyLength }} / 500
              </span>
            </label>
            <div class="input-wrapper textarea-wrapper" [class.has-error]="isInvalid('body')">
              <i class="fas fa-align-right input-icon textarea-icon"></i>
              <textarea
                class="form-control custom-input custom-textarea"
                formControlName="body"
                placeholder="اكتب محتوى الإشعار هنا..."
                rows="6"
                maxlength="500"
                [class.is-invalid]="isInvalid('body')"
              ></textarea>
            </div>
            <div class="field-error" *ngIf="isInvalid('body')">
              <i class="fas fa-exclamation-circle me-1"></i>
              محتوى الإشعار مطلوب
            </div>
          </div>
          
          <!-- Live Preview -->
          <div class="preview-card" *ngIf="showPreview">
            <div class="preview-header">
              <i class="fas fa-eye me-2"></i>
              معاينة الإشعار
            </div>
            <div class="preview-body">
              <div class="preview-app-icon">
                <i class="fas fa-home"></i>
              </div>
              <div class="preview-content">
                <p class="preview-title">{{ title || 'عنوان الإشعار' }}</p>
                <p class="preview-message">{{ body || 'محتوى الإشعار...' }}</p>
              </div>
            </div>
          </div>

          <!-- Submit -->
          <div class="d-flex justify-content-center mt-4">
            <button
              type="submit"
              class="btn btn-addSection btn-send"
              [disabled]="isLoading || form.invalid"
            >
              <ng-container *ngIf="!isLoading">
                <i class="fas fa-paper-plane me-2"></i>
                إرسال الإشعار
              </ng-container>
              <ng-container *ngIf="isLoading">
                <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                جاري الإرسال...
              </ng-container>
            </button>
          </div>

        </form>
      </div>
    </div>
  </div>

</div>
