<div class="container-fluid py-3">
  <div class="row">
    <div class="col-md-12 page-name">
      <h1 class="page-title">إضافة تنبيه</h1>
    </div>

    <!-- الرسائل -->
    <div *ngIf="successMessage" class="alert alert-success mt-3">{{ successMessage }}</div>
    <div *ngIf="errorMessage" class="alert alert-danger mt-3">{{ errorMessage }}</div>

    <!-- الفورم -->
    <form class="mt-2" (ngSubmit)="sendNotification()" #form="ngForm">
      <div class="row">
        <div class="col-md-6">
          <div class="form-group mt-3">
            <label for="title" class="form-label">عنوان الإشعار</label>
            <input id="title" class="form-control" [(ngModel)]="title" name="title" required />
          </div>
        </div>
        <div class="col-md-10">
          <div class="form-section mt-3">
            <label for="body" class="form-label">محتوى الإشعار</label>
            <textarea id="body" class="form-control" rows="11" [(ngModel)]="body" name="body"
              required></textarea>
          </div>
        </div>
        <div class="col-12 d-flex justify-content-center text-center mt-2">
          <button class="btn btn-addSection" type="submit" [disabled]="isLoading || form.invalid"><span
              *ngIf="!isLoading">إرسال</span>
            <span *ngIf="isLoading">جاري الإرسال...</span></button>
        </div>
      </div>
    </form>
  </div>
</div>
